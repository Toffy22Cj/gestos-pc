<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestos PC Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text: #f8fafc;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.2), transparent 500px),
                              radial-gradient(circle at bottom left, rgba(139, 92, 246, 0.2), transparent 500px);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 2rem;
            text-align: center;
            background: linear-gradient(180deg, rgba(15,23,42,1) 0%, rgba(15,23,42,0) 100%);
        }

        h1 { margin: 0; font-weight: 700; letter-spacing: -1px; font-size: 2.5rem; }
        
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            width: 90%;
            max-width: 1200px;
            margin-top: 1rem;
        }

        /* Glassmorphism Cards */
        .card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }
        
        .card:hover { transform: translateY(-5px); }

        /* Video Feed Header */
        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .status-indicator {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 700;
            background: rgba(2ef, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.4);
        }
        
        .status-indicator.running {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.4);
        }

        .video-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            position: relative;
            aspect-ratio: 4/3;
        }

        .video-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Controls */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn:hover { background: var(--primary-hover); }
        .btn-danger { background: #b91c1c; }
        .btn-danger:hover { background: #991b1b; }

        /* Mappings Table */
        .mapping-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }

        .mapping-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 12px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.5rem;
        }

        .mapping-item label {
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            color: white;
            padding: 0.75rem;
            border-radius: 8px;
            font-family: monospace;
            width: 100%;
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: var(--primary); }

        .gesture-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #60a5fa;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .del-btn {
            background: transparent;
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.4);
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .del-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .add-form {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>✨ Gestos PC</h1>
        <p style="color:#94a3b8">Control Inteligente con IA</p>
    </div>

    <div class="container">
        <!-- Live Feed -->
        <div class="card">
            <div class="video-header">
                <h2>Cámara en Vivo</h2>
                <div id="statusBadge" class="status-indicator">OFFLINE</div>
            </div>
            <div class="video-container">
                <img id="videoFeed" src="" alt="Cámara Detenida">
            </div>
            <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                <button class="btn" onclick="startEngine()">▶ Iniciar Motor</button>
                <button class="btn btn-danger" onclick="stopEngine()">⏹ Detener</button>
            </div>
        </div>

        <!-- Mappings CRUD -->
        <div class="card">
            <h2>Configuración de Comandos</h2>
            
            <div class="add-form">
                <input type="text" id="newGestureName" placeholder="Nombre Gesto (ej. SWIPE_ARRIBA)">
                <input type="text" id="newCommand" placeholder="Comando (ej. exec firefox)">
                <button class="btn" onclick="addMapping()">➕ Añadir</button>
            </div>

            <div class="mapping-list" id="mappingsList">
                <!-- Generado dinámicamente -->
            </div>
        </div>
    </div>

    <script>
        const API = '/api';

        async function updateStatus() {
            const res = await fetch(`${API}/status`);
            const data = await res.json();
            const badge = document.getElementById('statusBadge');
            const feed = document.getElementById('videoFeed');
            
            if (data.running) {
                badge.textContent = "ONLINE / LEYENDO GESTOS";
                badge.className = "status-indicator running";
                if (!feed.src.includes('video_feed')) feed.src = "/video_feed";
            } else {
                badge.textContent = "OFFLINE";
                badge.className = "status-indicator";
                feed.src = "";
            }
        }

        async function startEngine() {
            await fetch(`${API}/start`, { method: 'POST' });
            setTimeout(updateStatus, 1000);
        }

        async function stopEngine() {
            await fetch(`${API}/stop`, { method: 'POST' });
            updateStatus();
        }

        async function saveMapping(gestureName) {
            const input = document.getElementById(`hypr-${gestureName}`);
            await fetch(`${API}/mappings`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    gesture_name: gestureName,
                    command_hyprland: input.value
                })
            });
            input.style.borderColor = '#22c55e';
            setTimeout(() => input.style.borderColor = 'rgba(255, 255, 255, 0.1)', 1000);
        }

        async function deleteMapping(gestureName) {
            if(!confirm(`¿Seguro que deseas borrar el gesto ${gestureName}?`)) return;
            await fetch(`${API}/mappings/${gestureName}`, { method: 'DELETE' });
            loadMappings();
        }

        async function addMapping() {
            const nameInput = document.getElementById('newGestureName');
            const cmdInput = document.getElementById('newCommand');
            if(!nameInput.value) return;
            
            await fetch(`${API}/mappings`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    gesture_name: nameInput.value.toUpperCase().trim(),
                    command_hyprland: cmdInput.value
                })
            });
            
            nameInput.value = '';
            cmdInput.value = '';
            loadMappings();
        }

        async function loadMappings() {
            const res = await fetch(`${API}/mappings`);
            const data = await res.json();
            const list = document.getElementById('mappingsList');
            list.innerHTML = '';
            
            data.forEach(m => {
                list.innerHTML += `
                    <div class="mapping-item">
                        <div class="gesture-name">
                            <span>🧲 ${m.gesture_name}</span>
                            <button class="del-btn" onclick="deleteMapping('${m.gesture_name}')">🗑️ Borrar</button>
                        </div>
                        <div>
                            <label>Comando Hyprland</label>
                            <div style="display:flex; gap:0.5rem; margin-top:0.3rem">
                                <input type="text" id="hypr-${m.gesture_name}" value="${m.command_hyprland}">
                                <button class="btn" style="padding:0.5rem 1rem" onclick="saveMapping('${m.gesture_name}')">Guardar</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        setInterval(updateStatus, 2000);
        updateStatus();
        loadMappings();
    </script>
</body>
</html>
